name: Build & Release APK (Debug)

on:
  push:
    tags:
      - 'debug-v*'  # Para releases de prueba: debug-v1.0.0

permissions:
  contents: write  # Necesario para crear releases

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Delete old debug releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 2
          delete_tags: true
          delete_tag_pattern: debug-v
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Debug Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🧪 Versión de Prueba - Z407 Remote Control
            
            **⚠️ ADVERTENCIA: Esta es una versión de DEBUG, no para producción**
            
            ### 📦 Instalación
            1. Descarga el archivo APK
            2. Habilita "Instalar apps de fuentes desconocidas" en tu Android
            3. Instala el APK
            
            ### ⚠️ Requisitos
            - Android 13+ (API 33)
            - Bluetooth habilitado
            - Altavoces Logitech Z407
            
            ### 🐛 Para reportar bugs
            Abre un issue en este repositorio
          files: |
            app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

